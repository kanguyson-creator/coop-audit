<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>เช็คลิสต์ตรวจสอบบัญชีสหกรณ์ออมทรัพย์</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f0f;
    --surface: #181818;
    --surface2: #222222;
    --surface3: #2a2a2a;
    --border: #333;
    --orange: #f07020;
    --orange-dim: #b05010;
    --orange-glow: rgba(240,112,32,0.15);
    --orange-glow2: rgba(240,112,32,0.06);
    --white: #f0ece4;
    --white-dim: #aaa89f;
    --white-muted: #666;
    --green: #4caf78;
    --red: #e05050;
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'IBM Plex Sans Thai', sans-serif;
    --radius: 6px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--white);
    font-family: var(--sans);
    font-size: 14px;
    line-height: 1.6;
    min-height: 100vh;
  }

  /* ─── TOPBAR ─── */
  .topbar {
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    padding: 14px 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 20px;
  }
  .topbar-left { display: flex; align-items: center; gap: 14px; }
  .logo-badge {
    background: var(--orange);
    color: #fff;
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 500;
    padding: 4px 10px;
    border-radius: 3px;
    letter-spacing: 0.08em;
    white-space: nowrap;
  }
  .topbar-title {
    font-size: 15px;
    font-weight: 600;
    color: var(--white);
  }
  .topbar-sub {
    font-size: 12px;
    color: var(--white-muted);
    font-family: var(--mono);
  }
  .progress-wrap {
    display: flex;
    align-items: center;
    gap: 10px;
    min-width: 220px;
  }
  .progress-bar {
    flex: 1;
    height: 6px;
    background: var(--surface3);
    border-radius: 99px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--orange-dim), var(--orange));
    border-radius: 99px;
    transition: width 0.4s ease;
  }
  .progress-text {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--orange);
    white-space: nowrap;
  }
  .btn-reset {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--white-muted);
    padding: 5px 14px;
    border-radius: var(--radius);
    font-size: 12px;
    cursor: pointer;
    font-family: var(--sans);
    transition: all 0.2s;
  }
  .btn-reset:hover { border-color: var(--orange); color: var(--orange); }

  /* ─── NAME + SAVE ─── */
  .save-bar {
    position: sticky;
    bottom: 0;
    z-index: 100;
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 12px 28px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }
  .name-input {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--white);
    font-family: var(--sans);
    font-size: 13px;
    padding: 8px 14px;
    border-radius: var(--radius);
    width: 220px;
    outline: none;
    transition: border-color 0.2s;
  }
  .name-input:focus { border-color: var(--orange); }
  .name-input::placeholder { color: var(--white-muted); }
  .btn-save {
    background: var(--orange);
    color: #fff;
    border: none;
    padding: 8px 22px;
    border-radius: var(--radius);
    font-size: 13px;
    font-weight: 600;
    font-family: var(--sans);
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .btn-save:hover { background: var(--orange-dim); }
  .btn-save:active { transform: scale(0.97); }
  .btn-save:disabled { opacity: 0.5; pointer-events: none; }
  .save-status {
    font-size: 12px;
    font-family: var(--mono);
    padding: 6px 12px;
    border-radius: var(--radius);
    display: none;
  }
  .save-status.ok { display: block; background: rgba(76,175,120,0.15); color: #4caf78; border: 1px solid rgba(76,175,120,0.3); }
  .save-status.err { display: block; background: rgba(224,80,80,0.15); color: #e05050; border: 1px solid rgba(224,80,80,0.3); }
  .save-status.loading { display: block; background: var(--orange-glow2); color: var(--orange); border: 1px solid var(--orange-dim); }

  /* ─── MAIN LAYOUT ─── */
  .main {
    max-width: 1100px;
    margin: 0 auto;
    padding: 32px 28px 80px;
    display: grid;
    grid-template-columns: 220px 1fr;
    gap: 28px;
    align-items: start;
  }

  /* ─── SIDEBAR / TOC ─── */
  .sidebar {
    position: sticky;
    top: 70px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px 0;
    font-size: 13px;
  }
  .sidebar-title {
    padding: 0 18px 12px;
    font-size: 11px;
    font-family: var(--mono);
    color: var(--orange);
    letter-spacing: 0.1em;
    border-bottom: 1px solid var(--border);
    margin-bottom: 10px;
  }
  .toc-item {
    padding: 6px 18px;
    cursor: pointer;
    color: var(--white-muted);
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 8px;
    border-left: 3px solid transparent;
    font-size: 12.5px;
  }
  .toc-item:hover { color: var(--white); background: var(--surface2); }
  .toc-item.active { color: var(--orange); border-left-color: var(--orange); background: var(--orange-glow2); }
  .toc-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: currentColor;
    flex-shrink: 0;
  }
  .toc-progress {
    margin-left: auto;
    font-family: var(--mono);
    font-size: 10px;
    color: inherit;
    opacity: 0.7;
  }

  /* ─── CONTENT ─── */
  .content { min-width: 0; }

  /* ─── SECTION ─── */
  .section {
    margin-bottom: 32px;
  }
  .section-header {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 16px 20px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius) var(--radius) 0 0;
    border-bottom: 2px solid var(--orange);
  }
  .section-icon {
    width: 32px; height: 32px;
    background: var(--orange);
    border-radius: 4px;
    display: flex; align-items: center; justify-content: center;
    font-size: 15px;
    flex-shrink: 0;
  }
  .section-label {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--orange);
    letter-spacing: 0.1em;
    margin-bottom: 2px;
  }
  .section-title {
    font-size: 16px;
    font-weight: 600;
    color: var(--white);
  }
  .section-stats {
    margin-left: auto;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--white-muted);
  }

  /* ─── CHECKLIST TABLE ─── */
  .check-table {
    background: var(--surface);
    border: 1px solid var(--border);
    border-top: none;
    border-radius: 0 0 var(--radius) var(--radius);
    overflow: hidden;
  }
  .check-row {
    display: grid;
    grid-template-columns: 44px 1fr auto auto;
    align-items: center;
    gap: 0;
    border-bottom: 1px solid var(--border);
    transition: background 0.15s;
    min-height: 52px;
  }
  .check-row:last-child { border-bottom: none; }
  .check-row:hover { background: var(--surface2); }
  .check-row.checked { background: rgba(76,175,120,0.04); }
  .check-row.checked .row-name { color: var(--white-muted); text-decoration: line-through; text-decoration-color: var(--white-muted); }

  /* checkbox */
  .check-cell {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 8px;
    cursor: pointer;
    height: 100%;
  }
  .check-box {
    width: 20px; height: 20px;
    border: 1.5px solid var(--border);
    border-radius: 4px;
    background: var(--bg);
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
    flex-shrink: 0;
  }
  .check-box:hover { border-color: var(--orange); }
  .check-row.checked .check-box {
    background: var(--green);
    border-color: var(--green);
  }
  .check-icon { display: none; color: #fff; font-size: 13px; }
  .check-row.checked .check-icon { display: block; }

  /* row info */
  .row-info {
    padding: 10px 16px 10px 0;
    display: flex;
    flex-direction: column;
    gap: 3px;
  }
  .row-top {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }
  .row-code {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--orange);
    background: var(--orange-glow2);
    border: 1px solid var(--orange-dim);
    padding: 1px 7px;
    border-radius: 3px;
    white-space: nowrap;
  }
  .row-name {
    font-size: 13.5px;
    font-weight: 500;
    color: var(--white);
    transition: color 0.2s;
  }
  .row-type-badge {
    font-size: 10px;
    padding: 1px 7px;
    border-radius: 3px;
    font-weight: 500;
    white-space: nowrap;
  }
  .badge-asset { background: rgba(64,140,255,0.12); color: #80b4ff; border: 1px solid rgba(64,140,255,0.25); }
  .badge-liability { background: rgba(220,80,80,0.12); color: #f09090; border: 1px solid rgba(220,80,80,0.25); }
  .badge-equity { background: rgba(160,120,220,0.12); color: #c0a0ff; border: 1px solid rgba(160,120,220,0.25); }
  .badge-revenue { background: rgba(80,200,120,0.12); color: #80e0a0; border: 1px solid rgba(80,200,120,0.25); }
  .badge-expense { background: rgba(240,160,40,0.12); color: #f0c060; border: 1px solid rgba(240,160,40,0.25); }

  .row-desc {
    font-size: 12px;
    color: var(--white-muted);
    line-height: 1.4;
  }

  /* link btn */
  .row-link {
    padding: 10px 10px;
    display: flex;
    align-items: center;
  }
  .btn-info {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--orange);
    padding: 5px 12px;
    border-radius: var(--radius);
    font-size: 12px;
    cursor: pointer;
    font-family: var(--sans);
    font-weight: 500;
    transition: all 0.2s;
    white-space: nowrap;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .btn-info:hover {
    background: var(--orange-glow);
    border-color: var(--orange);
  }
  .btn-info-icon { font-size: 14px; }

  /* note input */
  .row-note-cell {
    padding: 8px 12px 8px 0;
  }
  .note-toggle {
    background: none;
    border: none;
    color: var(--white-muted);
    font-size: 16px;
    cursor: pointer;
    padding: 4px;
    transition: color 0.2s;
    border-radius: 3px;
  }
  .note-toggle:hover { color: var(--orange); background: var(--orange-glow2); }
  .note-area {
    display: none;
    padding: 0 16px 12px 44px;
    background: inherit;
  }
  .note-area.open { display: block; }
  .note-input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--white);
    font-family: var(--sans);
    font-size: 12.5px;
    padding: 8px 12px;
    border-radius: var(--radius);
    resize: vertical;
    min-height: 56px;
    line-height: 1.5;
    transition: border-color 0.2s;
  }
  .note-input:focus { outline: none; border-color: var(--orange); }
  .note-input::placeholder { color: var(--white-muted); }

  /* ─── MODAL ─── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.8);
    z-index: 200;
    display: none;
    align-items: flex-start;
    justify-content: center;
    padding: 40px 20px;
    overflow-y: auto;
    backdrop-filter: blur(4px);
  }
  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-top: 3px solid var(--orange);
    border-radius: var(--radius);
    width: 100%;
    max-width: 720px;
    position: relative;
    animation: modalIn 0.25s ease;
  }
  @keyframes modalIn {
    from { opacity: 0; transform: translateY(-16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .modal-header {
    padding: 20px 24px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: flex-start;
    gap: 16px;
  }
  .modal-badge {
    background: var(--orange);
    color: #fff;
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 600;
    padding: 6px 12px;
    border-radius: 4px;
    white-space: nowrap;
    flex-shrink: 0;
    margin-top: 2px;
  }
  .modal-title {
    font-size: 20px;
    font-weight: 700;
    color: var(--white);
    line-height: 1.3;
  }
  .modal-subtitle {
    font-size: 12px;
    color: var(--white-muted);
    font-family: var(--mono);
    margin-top: 3px;
  }
  .modal-close {
    margin-left: auto;
    background: none;
    border: none;
    color: var(--white-muted);
    font-size: 22px;
    cursor: pointer;
    padding: 4px 8px;
    border-radius: 4px;
    transition: all 0.2s;
    line-height: 1;
    flex-shrink: 0;
  }
  .modal-close:hover { background: var(--surface3); color: var(--white); }

  .modal-body {
    padding: 22px 24px;
  }

  /* modal sections */
  .m-section {
    margin-bottom: 22px;
  }
  .m-label {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.12em;
    color: var(--orange);
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .m-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .m-def {
    background: var(--surface2);
    border-left: 3px solid var(--orange);
    padding: 12px 16px;
    border-radius: 0 var(--radius) var(--radius) 0;
    font-size: 13.5px;
    line-height: 1.65;
    color: var(--white);
  }

  .m-kv {
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 4px 14px;
    font-size: 13px;
    line-height: 1.6;
  }
  .m-kv-key {
    color: var(--orange);
    font-weight: 500;
    white-space: nowrap;
    font-family: var(--mono);
    font-size: 12px;
    padding-top: 1px;
  }
  .m-kv-val { color: var(--white); }

  /* journal table in modal */
  .m-journal {
    margin-top: 8px;
  }
  .m-je-title {
    font-size: 12px;
    color: var(--white-muted);
    margin-bottom: 6px;
    padding: 5px 10px;
    background: var(--bg);
    border-radius: 3px;
    font-family: var(--mono);
  }
  .m-je-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12.5px;
    margin-bottom: 12px;
    border-radius: var(--radius);
    overflow: hidden;
  }
  .m-je-table th {
    background: #1a1a1a;
    color: var(--orange);
    font-family: var(--mono);
    font-size: 11px;
    padding: 7px 12px;
    text-align: left;
    font-weight: 500;
    border-bottom: 1px solid var(--border);
  }
  .m-je-table th:last-child, .m-je-table th:nth-last-child(2) { text-align: right; }
  .m-je-table td {
    padding: 7px 12px;
    border-bottom: 1px solid var(--border);
    color: var(--white);
  }
  .m-je-table tr:last-child td { border-bottom: none; }
  .m-je-table tr:nth-child(even) td { background: rgba(255,255,255,0.02); }
  .m-je-table td:last-child, .m-je-table td:nth-last-child(2) { text-align: right; font-family: var(--mono); }
  .side-d { color: var(--orange); font-weight: 600; font-family: var(--mono); font-size: 11px; }
  .side-c { color: var(--white-muted); font-weight: 500; font-family: var(--mono); font-size: 11px; }
  .acc-debit { color: var(--white); }
  .acc-credit { color: var(--white-muted); padding-left: 24px; }
  .amt-d { color: var(--orange); font-weight: 500; }
  .amt-c { color: #a0c8ff; font-weight: 500; }

  /* ref badge */
  .m-ref {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--orange-glow2);
    border: 1px solid var(--orange-dim);
    padding: 5px 12px;
    border-radius: var(--radius);
    font-size: 12px;
    color: var(--white-muted);
    font-style: italic;
    margin-top: 6px;
  }
  .m-ref span { color: var(--orange); }

  /* rule list */
  .m-rules {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .m-rules li {
    display: flex;
    gap: 10px;
    font-size: 13px;
    color: var(--white);
    line-height: 1.5;
  }
  .m-rules li::before {
    content: '▸';
    color: var(--orange);
    flex-shrink: 0;
    margin-top: 1px;
  }

  /* nav btns in modal */
  .modal-nav {
    display: flex;
    justify-content: space-between;
    padding: 14px 24px;
    border-top: 1px solid var(--border);
    gap: 12px;
  }
  .btn-nav {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--white-muted);
    padding: 7px 16px;
    border-radius: var(--radius);
    font-size: 13px;
    cursor: pointer;
    font-family: var(--sans);
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .btn-nav:hover { border-color: var(--orange); color: var(--orange); background: var(--orange-glow2); }
  .btn-nav:disabled { opacity: 0.3; pointer-events: none; }

  /* ─── EMPTY STATE ─── */
  .all-done {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    padding: 48px 24px;
    text-align: center;
    color: var(--white-muted);
    font-size: 14px;
  }
  .all-done.show { display: flex; }
  .done-icon { font-size: 48px; }

  /* scrollbar */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--orange-dim); }

  /* responsive */
  @media(max-width: 768px) {
    .main { grid-template-columns: 1fr; padding: 16px; }
    .sidebar { position: static; }
    .topbar { flex-wrap: wrap; gap: 10px; }
    .check-row { grid-template-columns: 40px 1fr auto; }
    .row-note-cell { display: none; }
  }

  /* print */
  @media print {
    .btn-info, .note-toggle, .modal-overlay, .topbar { display: none !important; }
    .main { grid-template-columns: 1fr; }
    .sidebar { display: none; }
    body { background: white; color: black; }
  }
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="topbar-left">
    <div class="logo-badge">AUDIT</div>
    <div>
      <div class="topbar-title">เช็คลิสต์ตรวจสอบบัญชีสหกรณ์ออมทรัพย์</div>
      <div class="topbar-sub">อ้างอิง: ระเบียบนายทะเบียนสหกรณ์ ว่าด้วยการบัญชี พ.ศ. 2563</div>
    </div>
  </div>
  <div class="progress-wrap">
    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    <div class="progress-text" id="progressText">0 / 0</div>
  </div>
  <button class="btn-reset" onclick="resetAll()">รีเซ็ต</button>
</div>

<!-- MAIN -->
<div class="main">

  <!-- SIDEBAR TOC -->
  <div class="sidebar" id="sidebar">
    <div class="sidebar-title">สารบัญ</div>
    <div id="tocList"></div>
  </div>

  <!-- CHECKLIST CONTENT -->
  <div class="content" id="content"></div>
</div>

<!-- SAVE BAR -->
<div class="save-bar">
  <input class="name-input" id="staffName" type="text" placeholder="ชื่อพนักงาน..." maxlength="50" />
  <button class="btn-save" id="btnSave" onclick="saveToSheets()">💾 บันทึกลง Google Sheets</button>
  <div class="save-status" id="saveStatus"></div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModalIfOutside(event)">
  <div class="modal" id="modal">
    <div class="modal-header">
      <div class="modal-badge" id="mCode"></div>

// ── Build flat account list for navigation ──
const allAccounts = [];
SECTIONS.forEach(sec => sec.accounts.forEach(acc => allAccounts.push(acc)));
let currentModalIdx = -1;

const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwI7NOhBOoN1qx4BRhTtiTN8H4sppL6o4EkDKsEfR1zQqo6A855W-p3V505x4sTUQfq/exec";

// ── Save to Google Sheets ──
async function saveToSheets() {
  const name = document.getElementById('staffName').value.trim();
  if (!name) {
    alert('กรุณาใส่ชื่อพนักงานก่อนบันทึกครับ');
    document.getElementById('staffName').focus();
    return;
  }

  const btn = document.getElementById('btnSave');
  const status = document.getElementById('saveStatus');

  btn.disabled = true;
  status.className = 'save-status loading';
  status.textContent = '⏳ กำลังบันทึก...';

  // รวบรวมข้อมูลทั้งหมด
  const items = [];
  SECTIONS.forEach(sec => {
    sec.accounts.forEach(acc => {
      acc.checkItems.forEach((item, i) => {
        const key = getKey(acc.code + '_' + i);
        const noteKey = getNoteKey(acc.code + '_' + i);
        items.push({
          account: acc.code + ' ' + acc.name,
          item: item,
          checked: !!state[key],
          note: notes[noteKey] || ''
        });
      });
    });
  });

  try {
    await fetch(SCRIPT_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, items })
    });

    status.className = 'save-status ok';
    status.textContent = '✅ บันทึกสำเร็จแล้วครับ';
    setTimeout(() => { status.className = 'save-status'; }, 4000);

  } catch(err) {
    status.className = 'save-status err';
    status.textContent = '❌ บันทึกไม่สำเร็จ ลองใหม่อีกครั้ง';
  }

  btn.disabled = false;
}

// ── State ──
const state = {};
const notes = {};

function getKey(code) { return 'chk_' + code; }
function getNoteKey(code) { return 'note_' + code; }

function save() {
  try { localStorage.setItem('coopAuditState', JSON.stringify({state, notes})); } catch(e) {}
}
function load() {
  try {
    const d = JSON.parse(localStorage.getItem('coopAuditState') || '{}');
    Object.assign(state, d.state || {});
    Object.assign(notes, d.notes || {});
  } catch(e) {}
}

// ── Render ──
function buildHTML() {
  const content = document.getElementById('content');
  const tocList = document.getElementById('tocList');
  content.innerHTML = '';
  tocList.innerHTML = '';

  SECTIONS.forEach(sec => {
    // TOC
    const totalItems = sec.accounts.reduce((a,acc) => a + acc.checkItems.length, 0);
    const doneItems = sec.accounts.reduce((a,acc) => a + acc.checkItems.filter((_,i) => state[getKey(acc.code+'_'+i)]).length, 0);

    const tocEl = document.createElement('div');
    tocEl.className = 'toc-item';
    tocEl.id = 'toc_' + sec.id;
    tocEl.innerHTML = `<span class="toc-dot"></span>${sec.icon} ${sec.title}<span class="toc-progress">${doneItems}/${totalItems}</span>`;
    tocEl.onclick = () => document.getElementById(sec.id).scrollIntoView({behavior:'smooth', block:'start'});
    tocList.appendChild(tocEl);

    // Section
    const secEl = document.createElement('div');
    secEl.className = 'section';
    secEl.id = sec.id;

    const totalSec = sec.accounts.reduce((a,acc) => a + acc.checkItems.length, 0);
    const doneSec = sec.accounts.reduce((a,acc) => a + acc.checkItems.filter((_,i) => state[getKey(acc.code+'_'+i)]).length, 0);

    secEl.innerHTML = `
      <div class="section-header">
        <div class="section-icon">${sec.icon}</div>
        <div>
          <div class="section-label">${sec.label}</div>
          <div class="section-title">${sec.title}</div>
        </div>
        <div class="section-stats">${doneSec} / ${totalSec} รายการ</div>
      </div>
      <div class="check-table" id="table_${sec.id}"></div>
    `;
    content.appendChild(secEl);

    const table = secEl.querySelector('#table_' + sec.id);

    sec.accounts.forEach(acc => {
      const accIdx = allAccounts.indexOf(acc);

      // Account header row
      const accHeader = document.createElement('div');
      accHeader.style.cssText = 'padding:10px 16px 6px 44px; display:flex; align-items:center; gap:10px; background:var(--surface2); border-bottom:1px solid var(--border);';
      accHeader.innerHTML = `
        <span class="row-code">${acc.code}</span>
        <span style="font-size:14px;font-weight:600;color:var(--white)">${acc.name}</span>
        <span class="row-type-badge ${acc.badge}">${acc.type}</span>
        <span style="font-size:12px;color:var(--white-muted);flex:1">${acc.shortDesc}</span>
        <button class="btn-info" onclick="openModal(${accIdx})">
          <span class="btn-info-icon">📖</span> ดูคู่มือ
        </button>
      `;
      table.appendChild(accHeader);

      // Check items
      acc.checkItems.forEach((item, i) => {
        const key = getKey(acc.code + '_' + i);
        const noteKey = getNoteKey(acc.code + '_' + i);
        const isDone = !!state[key];
        const noteVal = notes[noteKey] || '';

        const row = document.createElement('div');
        row.className = 'check-row' + (isDone ? ' checked' : '');
        row.id = key;
        row.innerHTML = `
          <div class="check-cell" onclick="toggleCheck('${key}', this)">
            <div class="check-box">
              <span class="check-icon">✓</span>
            </div>
          </div>
          <div class="row-info">
            <div class="row-name">${item}</div>
          </div>
          <div class="row-link"></div>
          <div class="row-note-cell">
            <button class="note-toggle" title="เพิ่มหมายเหตุ" onclick="toggleNote('${noteKey}', this)">💬</button>
          </div>
        `;

        const noteArea = document.createElement('div');
        noteArea.className = 'note-area' + (noteVal ? ' open' : '');
        noteArea.id = 'note_' + noteKey;
        noteArea.innerHTML = `<textarea class="note-input" placeholder="หมายเหตุ / ข้อสังเกต..." oninput="saveNote('${noteKey}', this.value)">${noteVal}</textarea>`;

        table.appendChild(row);
        table.appendChild(noteArea);
      });
    });
  });

  updateProgress();
}

function toggleCheck(key, clickedCell) {
  state[key] = !state[key];
  const row = document.getElementById(key);
  row.classList.toggle('checked', state[key]);
  save();
  updateProgress();
  rebuildStats();
}

function toggleNote(noteKey, btn) {
  const area = document.getElementById('note_' + noteKey);
  area.classList.toggle('open');
}

function saveNote(noteKey, val) {
  notes[noteKey] = val;
  save();
}

function updateProgress() {
  const allItems = allAccounts.reduce((a,acc) => a + acc.checkItems.length, 0);
  const doneItems = Object.values(state).filter(Boolean).length;
  const pct = allItems > 0 ? Math.round(doneItems / allItems * 100) : 0;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = doneItems + ' / ' + allItems;

  // Update TOC stats
  SECTIONS.forEach(sec => {
    const totalItems = sec.accounts.reduce((a,acc) => a + acc.checkItems.length, 0);
    const doneItems2 = sec.accounts.reduce((a,acc) => a + acc.checkItems.filter((_,i) => state[getKey(acc.code+'_'+i)]).length, 0);
    const tocEl = document.getElementById('toc_' + sec.id);
    if(tocEl) {
      const prog = tocEl.querySelector('.toc-progress');
      if(prog) prog.textContent = doneItems2 + '/' + totalItems;
      tocEl.classList.toggle('active', doneItems2 > 0 && doneItems2 < totalItems);
    }
  });
}

function rebuildStats() {
  SECTIONS.forEach(sec => {
    const totalSec = sec.accounts.reduce((a,acc) => a + acc.checkItems.length, 0);
    const doneSec = sec.accounts.reduce((a,acc) => a + acc.checkItems.filter((_,i) => state[getKey(acc.code+'_'+i)]).length, 0);
    const hdr = document.querySelector('#' + sec.id + ' .section-stats');
    if(hdr) hdr.textContent = doneSec + ' / ' + totalSec + ' รายการ';
  });
}

function resetAll() {
  if(!confirm('รีเซ็ตเช็คลิสต์ทั้งหมด?')) return;
  Object.keys(state).forEach(k => delete state[k]);
  Object.keys(notes).forEach(k => delete notes[k]);
  save();
  buildHTML();
}

// ── MODAL ──
function openModal(idx) {
  currentModalIdx = idx;
  renderModal(idx);
  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow = '';
}

function closeModalIfOutside(e) {
  if(e.target === document.getElementById('modalOverlay')) closeModal();
}

function navModal(dir) {
  const newIdx = currentModalIdx + dir;
  if(newIdx >= 0 && newIdx < allAccounts.length) openModal(newIdx);
}

function renderModal(idx) {
  const acc = allAccounts[idx];
  const k = acc.knowledge;

  document.getElementById('mCode').textContent = acc.code;
  document.getElementById('mTitle').textContent = acc.name;
  document.getElementById('mType').textContent = acc.type + '  ·  ' + acc.shortDesc;

  // Build body
  let html = '';

  // Definition
  html += `<div class="m-section">
    <div class="m-label">นิยามและความหมาย</div>
    <div class="m-def">${k.def.replace(/\n/g,'<br>')}</div>
  </div>`;

  // Recognition + Measurement
  html += `<div class="m-section">
    <div class="m-label">หลักการรับรู้และการวัดมูลค่า</div>
    <div class="m-kv">
      <div class="m-kv-key">การรับรู้ :</div>
      <div class="m-kv-val">${k.recognition}</div>
      <div class="m-kv-key">การวัดมูลค่า :</div>
      <div class="m-kv-val">${k.measurement}</div>
    </div>
  </div>`;

  // Examples
  if(k.examples && k.examples.length) {
    html += `<div class="m-section">
      <div class="m-label">ตัวอย่างการบันทึกบัญชี</div>
      <div class="m-journal">`;

    k.examples.forEach(ex => {
      html += `<div class="m-je-title">◉ ${ex.title}</div>
        <table class="m-je-table">
          <thead><tr>
            <th style="width:48px">ด้าน</th>
            <th>ชื่อบัญชี</th>
            <th style="width:110px">เดบิต</th>
            <th style="width:110px">เครดิต</th>
          </tr></thead>
          <tbody>`;
      ex.rows.forEach(r => {
        const sd = r.side === 'Dr' ? `<span class="side-d">Dr</span>` : `<span class="side-c">Cr</span>`;
        const an = r.side === 'Dr' ? `<span class="acc-debit">${r.acc}</span>` : `<span class="acc-credit">${r.acc}</span>`;
        const d = r.dr ? `<span class="amt-d">${r.dr}</span>` : '<span style="color:var(--white-muted)">—</span>';
        const c = r.cr ? `<span class="amt-c">${r.cr}</span>` : '<span style="color:var(--white-muted)">—</span>';
        html += `<tr><td>${sd}</td><td>${an}</td><td>${d}</td><td>${c}</td></tr>`;
      });
      html += '</tbody></table>';
    });

    html += `</div></div>`;
  }

  // Reference
  html += `<div class="m-section">
    <div class="m-ref">📌 <span>อ้างอิง:</span> ${k.ref}</div>
  </div>`;

  document.getElementById('mBody').innerHTML = html;

  // Nav buttons
  document.getElementById('btnPrev').disabled = idx === 0;
  document.getElementById('btnNext').disabled = idx === allAccounts.length - 1;

  if(idx > 0) document.getElementById('btnPrev').textContent = '← ' + allAccounts[idx-1].code + ' ' + allAccounts[idx-1].name;
  if(idx < allAccounts.length - 1) document.getElementById('btnNext').textContent = allAccounts[idx+1].code + ' ' + allAccounts[idx+1].name + ' →';
}

// keyboard nav
document.addEventListener('keydown', e => {
  if(document.getElementById('modalOverlay').classList.contains('open')) {
    if(e.key === 'Escape') closeModal();
    if(e.key === 'ArrowLeft') navModal(-1);
    if(e.key === 'ArrowRight') navModal(1);
  }
});

// intersection observer for TOC active state
const observer = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if(entry.isIntersecting) {
      document.querySelectorAll('.toc-item').forEach(t => t.classList.remove('active'));
      const tocEl = document.getElementById('toc_' + entry.target.id);
      if(tocEl) tocEl.classList.add('active');
    }
  });
}, { threshold: 0.1, rootMargin: '-70px 0px -60% 0px' });

// ── INIT ──
load();
buildHTML();

// observe sections after build
setTimeout(() => {
  SECTIONS.forEach(sec => {
    const el = document.getElementById(sec.id);
    if(el) observer.observe(el);
  });
}, 100);
</script>
